# ==========================================
# 1. Database Connection (Docker Compose)
# ==========================================
# Points to localhost:5432 where Docker is mapping the Postgres port
# 'hireready' matches the POSTGRES_DB in your yaml file
spring.datasource.url=jdbc:postgresql://localhost:5432/hireready
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# 2. JPA / Hibernate Logic
# ==========================================
# 'update' tells Hibernate to check your @Entity classes (like User.java)
# and automatically create or modify tables to match them.
spring.jpa.hibernate.ddl-auto=update

# This prints every SQL query to your console so you can see what's happening
spring.jpa.show-sql=true
# This makes the printed SQL pretty and readable
spring.jpa.properties.hibernate.format_sql=true

# Ensures Hibernate uses the correct dialect for PostgreSQL features
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 3. Application Settings
# ==========================================
spring.application.name=hireready
server.port=8080

# ==========================================
# 4. JWT Settings
# ==========================================
# Read from environment variables set JWT_SECRET and JWT_EXPIRATION on your machine/server
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}